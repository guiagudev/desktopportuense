<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Jugadores</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div class="container mt-5">
        <h1>Listado de Jugadores</h1>
        
        <!-- Botón para abrir la ventana del formulario -->
        <button id="openFormButton" class="btn btn-primary">Agregar Nuevo Jugador</button>
        
        <ul id="jugadoresList" class="list-group mt-4">
            <!-- Aquí se cargará la lista de jugadores -->
        </ul>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Enviar mensaje a Electron para abrir el formulario
        $('#openFormButton').click(function() {
            window.api.openFormWindow();  // Usamos la API que definimos en el main
        });
    </script>
</body>
</html>
